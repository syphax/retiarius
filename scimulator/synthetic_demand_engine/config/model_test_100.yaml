# CSV-Based Configuration Example
# Products, geographic weights, and correlations are loaded from CSV files.
# Only simulation parameters are specified here in YAML.

start_date: "2026-01-01"
end_date: "2026-03-31"
frequency: "D"  # Daily data
seed: 42
output_format: "csv"

# CSV input file paths (can also be passed via CLI --products-csv, etc.)
products_csv: "./scimulator/data/product_master_test_100.csv"
geo_weights_csv: "./scimulator/data/zip3_weights_pop.csv"
#correlations_csv: "./scimulator/data/correlations.csv"

metadata:
  description: "Test demand for 2026Q1 for 100 products across all ZIP3 regions"
  author: "Demand Generation Engine"
  version: "2.0"
